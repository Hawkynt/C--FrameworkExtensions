name: CI

# Event-driven (no cron). Replaces the old NewBuild.yml + Tests.yml.
# release.yml and nightly.yml reuse this via `workflow_call` / `workflow_run`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Cross-platform packages must compile on Linux. ASP.NET / Office / Win32 are
  # intentionally excluded here (Windows-only surfaces) — same set the original
  # NewBuild.yml built.
  build:
    name: build (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                       # version.pl counts commits for the build number
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x
      - run: dotnet --info
      - name: Stamp versions
        run: perl ".github/workflows/scripts/version.pl" --stamp
      - name: Build cross-platform packages
        shell: bash
        run: |
          set -euo pipefail
          for p in \
            Backports/Backports.csproj \
            Corlib.Extensions/Corlib.Extensions.csproj \
            PresentationCore.Extensions/PresentationCore.Extensions.csproj \
            System.Drawing.Extensions/System.Drawing.Extensions.csproj \
            System.Windows.Forms.Extensions/System.Windows.Forms.Extensions.csproj \
            System.DirectoryServices.AccountManagement.Extensions/DirectoryServices.Extensions.csproj; do
            echo "::group::build $p"
            dotnet restore "$p"
            dotnet build "$p" --no-restore --configuration Release
            echo "::endgroup::"
          done

  # NB: tests run on WINDOWS ONLY — the test runner misbehaves on ubuntu (not
  # our code). Preserved verbatim from the original Tests.yml, including the
  # multi-SDK install and the Debug/Release x AnyCPU/x86/x64 matrix.
  test:
    name: test (windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        architecture: [AnyCPU, x86, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x
            8.x
            6.x
            5.x
            3.1
      # Required tier — the core suite. Excludes the Performance category so a
      # slow shared runner can't fail the build on a wall-clock assertion.
      - name: Test (required — excludes Performance)
        run: dotnet test "Tests/Corlib.Tests/Corlib.Tests.csproj" --configuration ${{ matrix.configuration }} --arch ${{ matrix.architecture }} --filter "TestCategory!=Performance" --verbosity normal /p:TreatWarningsAsErrors=false /p:NoWarn=1591;1584;1658;1573;1574;8619;8620

      # Advisory tier — wall-clock performance tests. They run and report, but
      # continue-on-error means a timing blip never blocks a merge.
      - name: Test (advisory — Performance, never blocks)
        continue-on-error: true
        run: dotnet test "Tests/Corlib.Tests/Corlib.Tests.csproj" --configuration ${{ matrix.configuration }} --arch ${{ matrix.architecture }} --filter "TestCategory=Performance" --verbosity normal /p:TreatWarningsAsErrors=false /p:NoWarn=1591;1584;1658;1573;1574;8619;8620
